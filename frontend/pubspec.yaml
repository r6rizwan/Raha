name: raha
description: "Raha is a mobile app for expats and immigrants — built with Flutter + Node.js. Discover food from your home cuisine, book trusted home services, and get AI-personalised recommendations tailored to whatever city you live in and your nationality."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3
  dio: ^5.9.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^10.3.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fpdart: ^1.2.0
  intl: ^0.20.2
  uuid: ^4.5.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A5D4B"
  image: assets/logo.png
  android: true
  ios: true
  fullscreen: true


flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
